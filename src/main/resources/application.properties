# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/springjpa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=jpauser
spring.datasource.password=jpa1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.application.name=hello-spring-data-jpa

# Tomcat UTF-8 URI 인코딩 (한국어 쿼리 파라미터 처리)
server.tomcat.uri-encoding=UTF-8
